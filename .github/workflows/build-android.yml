name: Compile Voice Alarm Production Android App

on:
  push:
    branches:
      - main
    paths:
      - 'EchoCare/**'
      - '.github/workflows/build-android.yml'

jobs:
  build:
    name: Build Signed release AAB & testing APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      - name: Generate Gradle Wrapper
        run: |
          cd EchoCare
          gradle wrapper

      - name: Make Gradle Wrapper Executable
        run: chmod +x ./EchoCare/gradlew
        continue-on-error: true # Falls back if project uses system gradle

      - name: Decode Android Keystore
        run: |
          if [ ! -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > ./EchoCare/app/keystore.jks
          else
            echo "Keystore secret not set. Skipping decoding."
          fi

      - name: Compile Production App Bundle (AAB) & APK
        run: |
          cd EchoCare
          ./gradlew bundleRelease assembleRelease 2>&1 | tee ../gradle_build.log
        env:
          KEYSTORE_PATH: "keystore.jks"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Gradle Build Logs on Failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-logs
          path: gradle_build.log

      - name: Upload Signed Android App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: voice-alarm-release-aab
          path: EchoCare/app/build/outputs/bundle/release/app-release.aab

      - name: Upload Testing APK
        uses: actions/upload-artifact@v4
        with:
          name: voice-alarm-testing-apk
          path: EchoCare/app/build/outputs/apk/release/app-release.apk
